services:
  - type: web
    name: aldryon-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: WEB_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: aldryon-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false

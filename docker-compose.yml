# Local development stack — mirrors exactly how Render deploys: apps/api and
# apps/web each run from their own Dockerfile (render.yaml uses
# `runtime: docker` for both). No local Postgres here on purpose — the app
# always talks to the real Supabase project (DATABASE_URL in apps/api/.env
# points at Supabase directly; see plans/plan1.md §4). Integration tests use
# a separate, ephemeral testcontainers Postgres instead — unrelated to this
# file, see apps/api/tests/integration/support/postgresEnvironment.ts.
#
#   bun run docker:up   # build + start api & web
#
# api and web read their env vars from apps/api/.env and apps/web/.env.local
# respectively (both gitignored) — see the "Running locally" section of
# README.md for what each needs. NEXT_PUBLIC_* vars are baked into the web
# image at BUILD time (Next.js inlines them client-side), so they're passed
# as build args below via docker-compose's ${VAR} substitution — that's why
# `docker:up` passes --env-file apps/web/.env.local (see the root
# package.json script), not because api needs it.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # Build-time only — Next.js inlines these into the client bundle, so
      # NEXT_PUBLIC_API_URL must be the browser-facing URL (localhost),
      # never an internal compose hostname the browser can't resolve.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
